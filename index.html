<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Life Bank</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: #f5c76b;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 18px;
      box-sizing: border-box;
    }

    .card {
      width: min(520px, 100%);
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 22px;
      text-align: center;
    }

    .label {
      font-size: 12px;
      color: #aaa;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .balance {
      margin-top: 12px;
      font-size: 42px;
      font-weight: 800;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: #ffffff;
    }

    .sub {
      margin-top: 8px;
      font-size: 13px;
      color: #9a9a9a;
    }

    .summary {
      margin-top: 16px;
      font-size: 14px;
      color: #cfcfcf;
    }

    .summary strong { color: #00d27a; }

    .row {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.10);
      color: #f5c76b;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
    }

    button.primary {
      border-color: rgba(245,199,107,0.35);
      color: #fff;
      background: rgba(245,199,107,0.12);
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="label">Life Balance</div>
    <div class="balance" id="balance">--:--:--</div>
    <div class="sub" id="subtext">Counting from 8:00 PM today</div>

    <div class="summary" id="summary">
      Today you spent <strong>0.00</strong> hours
    </div>

    <div class="row">
      <button id="pauseBtn">Pause</button>
      <button class="primary" id="resetBtn">Reset to 8:00 PM</button>
    </div>
  </div>

<script>
  // SETTINGS (edit later if you want)
  const startAge = 31;
  const lifeExpectancy = 100;

  // Start at exactly 8:00 PM today
  function getStartTimeToday() {
    const d = new Date();
    d.setHours(20, 0, 0, 0);
    return d;
  }

  let startTime = getStartTimeToday();
  const totalLifeHours = (lifeExpectancy - startAge) * 365.25 * 24;

  let paused = false;

  function updateBalance() {
    if (paused) return;

    const now = new Date();

    // If it's before 8:00 PM today, elapsed should be 0
    let elapsedMs = now - startTime;
    if (elapsedMs < 0) elapsedMs = 0;

    const elapsedHours = elapsedMs / (1000 * 60 * 60);
    let remaining = totalLifeHours - elapsedHours;
    if (remaining < 0) remaining = 0;

    const h = Math.floor(remaining);
    const m = Math.floor((remaining - h) * 60);
    const s = Math.floor((((remaining - h) * 60) - m) * 60);

    document.getElementById("balance").textContent =
      h.toLocaleString() + ":" +
      String(m).padStart(2, "0") + ":" +
      String(s).padStart(2, "0");

    // Daily summary: hours since midnight
    const startOfDay = new Date();
    startOfDay.setHours(0, 0, 0, 0);
    const hoursToday = (now - startOfDay) / (1000 * 60 * 60);

    document.getElementById("summary").innerHTML =
      `Today you spent <strong>${hoursToday.toFixed(2)}</strong> hours`;
  }

  document.getElementById("pauseBtn").addEventListener("click", () => {
    paused = !paused;
    document.getElementById("pauseBtn").textContent = paused ? "Resume" : "Pause";
    if (!paused) updateBalance();
  });

  document.getElementById("resetBtn").addEventListener("click", () => {
    startTime = getStartTimeToday();
    updateBalance();
  });

  setInterval(updateBalance, 1000);
  updateBalance();
</script>

</body>
</html>
